{% extends "base.html" %}

{% block title %}Servicios · ICGS{% endblock %}

{% block content %}
<div class="page-content">
  <div class="wrap">
    <div class="page-head">
      <h1>Servicios</h1>
      <p class="lead">Soluciones prácticas orientadas a resultados.</p>
    </div>

    <div class="g3">
      {% for s in services %}
        <div class="icgs-card">
          <h2 style="font-size:17px;margin-bottom:8px;">{{ s.title }}</h2>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">{{ s.summary }}</p>
        </div>
      {% empty %}
        <div class="icgs-card" style="grid-column:1/-1;">
          <p style="color:var(--text-muted);margin:0;">Aún no hay servicios cargados.</p>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
