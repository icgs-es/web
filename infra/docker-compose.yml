services:
  db:
    image: postgres:16-alpine
    container_name: icgs_web_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - icgs_web_pg:/var/lib/postgresql/data
    networks:
      - icgs_internal

  web:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: icgs_web_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - icgs_web_static:/vol/static
      - icgs_web_media:/vol/media
    networks:
      - icgs_internal
      - web

volumes:
  icgs_web_pg:
  icgs_web_static:
  icgs_web_media:

networks:
  icgs_internal:
  web:
    external: true
